<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Suite — Extracurriculars</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="extracurriculars">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="eyebrow">Student Suite</div>
        <h1>Extracurriculars</h1>
      </div>

      <nav class="nav">
        <a class="nav-link" href="./index.html">Dashboard</a>
        <a class="nav-link" href="./academics.html">Academics</a>
        <a class="nav-link" href="./college.html">College Hub</a>
        <a class="nav-link active" href="./extracurriculars.html">Extracurriculars</a>
        <a class="nav-link" href="./settings.html">Settings</a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-full" onclick="logoutUser()">Log Out</button>
      </div>
    </aside>

    <main class="main">
      <header class="hero">
        <div>
          <div class="eyebrow">Activities</div>
          <h2>Impact + Planning</h2>
          <p>Track leadership, results, reminders, resume bullets, and essay angles.</p>
        </div>
      </header>

      <section class="two-col">
        <article class="card">
          <div class="section-head">
            <div>
              <div class="eyebrow">Add Activity</div>
              <h3>New Extracurricular</h3>
            </div>
          </div>

          <form id="activityForm" class="stack-form">
            <input type="text" id="activityTitle" placeholder="Activity name" required />
            <input type="text" id="activityCategory" placeholder="Category" required />
            <button type="submit" class="btn btn-primary">Add Activity</button>
          </form>
        </article>

        <article class="card">
          <div class="section-head">
            <div>
              <div class="eyebrow">Overview</div>
              <h3>Activity Count</h3>
            </div>
          </div>

          <div id="activitySummary"></div>
        </article>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <div class="eyebrow">Workspace</div>
            <h3>Extracurricular Dashboard</h3>
          </div>
        </div>

        <div id="extracurricularList"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
