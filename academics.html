<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Suite — Academics</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="academics">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="eyebrow">Student Suite</div>
        <h1>Academics</h1>
      </div>

      <nav class="nav">
        <a class="nav-link" href="./index.html">Dashboard</a>
        <a class="nav-link active" href="./academics.html">Academics</a>
        <a class="nav-link" href="./college.html">College Hub</a>
        <a class="nav-link" href="./extracurriculars.html">Extracurriculars</a>
        <a class="nav-link" href="./settings.html">Settings</a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-full" onclick="logoutUser()">Log Out</button>
      </div>
    </aside>

    <main class="main">
      <header class="hero">
        <div>
          <div class="eyebrow">Academics</div>
          <h2>Subject Workspaces</h2>
          <p>Add classes, quarter assignments, notes, reminders, and study materials.</p>
        </div>
      </header>

      <section class="two-col">
        <article class="card">
          <div class="section-head">
            <div>
              <div class="eyebrow">Add Subject</div>
              <h3>New Course</h3>
            </div>
          </div>

          <form id="courseForm" class="stack-form">
            <select id="courseYear" required></select>
            <input type="text" id="courseName" placeholder="Course name" required />
            <select id="courseLevel" required></select>
            <button type="submit" class="btn btn-primary">Add Course</button>
          </form>
        </article>

        <article class="card">
          <div class="section-head">
            <div>
              <div class="eyebrow">View</div>
              <h3>School Year</h3>
            </div>
          </div>

          <select id="academicsYearSelector"></select>
        </article>
      </section>

      <section class="card">
        <div class="section-head">
          <div>
            <div class="eyebrow">Workspace</div>
            <h3>Academic Subjects</h3>
          </div>
        </div>

        <div id="subjectWorkspaceList"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
