<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Suite — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="auth">
  <div class="app-shell auth-shell">
    <main class="main-content auth-main">
      <section class="panel auth-panel">
        <div class="eyebrow">Student Suite</div>
        <h1 class="page-title">Welcome back</h1>
        <p class="page-subtitle">
          Create an account or log in to access your dashboard.
        </p>

        <div class="two-column auth-two-column">
          <article class="panel auth-card-inner">
            <div class="section-head">
              <div>
                <div class="eyebrow">Sign Up</div>
                <h3 class="section-title">Create Account</h3>
              </div>
            </div>

            <form id="signupForm" class="editorial-form">
              <input type="email" id="signupEmail" placeholder="Email address" required />
              <input type="password" id="signupPassword" placeholder="Password" required />
              <button type="submit" class="btn btn-full">Create Account</button>
            </form>
          </article>

          <article class="panel auth-card-inner">
            <div class="section-head">
              <div>
                <div class="eyebrow">Log In</div>
                <h3 class="section-title">Existing User</h3>
              </div>
            </div>

            <form id="loginForm" class="editorial-form">
              <input type="email" id="loginEmail" placeholder="Email address" required />
              <input type="password" id="loginPassword" placeholder="Password" required />
              <button type="submit" class="btn btn-full">Log In</button>
            </form>
          </article>
        </div>

        <div id="authMessage" class="top-space"></div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
</body>
</html>
